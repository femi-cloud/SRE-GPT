name: SRE-GPT Autonomous Agent

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv google-genai psycopg2-binary

      - name: Run SRE-GPT Agent (single cycle)
        env:
          DT_ENVIRONMENT_URL: ${{ secrets.DT_ENVIRONMENT_URL }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          GITHUB_GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
          ALERT_LATENCY_MS: "1000"
          ALERT_ERROR_RATE: "0.1"
        run: |
          cd agent
          python agent_single_cycle.py