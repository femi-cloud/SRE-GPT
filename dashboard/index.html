<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SRE-GPT Ops Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <style>
    :root {
      --bg-color: #0B1220;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.15);
      --glow-red: 0 0 24px rgba(239, 68, 68, 0.4);
    }
    body {
      background-color: var(--bg-color);
      color: white;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.6s ease;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body.incident-mode {
      background-color: #1a0a0a;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05); /* bg-white/5 */
      backdrop-filter: blur(24px); /* backdrop-blur-xl */
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1); /* border-white/10 */
      border-radius: 16px;
      transition: all 0.4s ease;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); /* shadow-[0_4px_30px_rgba(0,0,0,0.1)] */
      position: relative;
      overflow: hidden;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(6,182,212,0.05) 0%, rgba(124,58,237,0.05) 100%);
      pointer-events: none;
      z-index: 0;
    }
    .glass-card > * {
      position: relative;
      z-index: 1;
    }
    body.incident-mode .glass-card {
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 4px 30px rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
    }
    body.incident-mode .glass-card::before {
      background: linear-gradient(135deg, rgba(239,68,68,0.05) 0%, rgba(185,28,28,0.05) 100%);
    }
    .terminal-font {
      font-family: 'JetBrains Mono', monospace;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    @keyframes pulse-green {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    .heartbeat-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background-color: #22c55e;
      animation: pulse-green 2s infinite;
    }
    .heartbeat-dot.offline {
      background-color: #ef4444;
      animation: none;
      box-shadow: none;
    }
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    }
    .slide-in {
      animation: slideIn 0.3s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .text-glow {
      text-shadow: 0 0 10px currentColor;
    }
  </style>
</head>
<body class="p-4 md:p-8">

<!-- Subtle Radial Gradient Overlays -->
<div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-cyan-500/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="absolute bottom-10 right-1/4 w-[600px] h-[600px] bg-purple-500/5 rounded-full blur-[140px] pointer-events-none z-0"></div>
<div class="absolute top-1/2 left-2/3 w-[450px] h-[450px] bg-cyan-500/5 rounded-full blur-[110px] pointer-events-none z-0"></div>

<!-- Navbar -->
<nav class="glass-card mb-8 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 relative z-50">
  <div class="flex items-center gap-4">
    <img src="logo.svg" class="h-10 w-10" alt="SRE-GPT"/>
    <div>
      <h1 class="text-xl font-bold tracking-wide" id="nav-title">Ops Center</h1>
      <p class="text-xs text-gray-400" id="nav-subtitle">Autonomous SRE Dashboard</p>
    </div>
  </div>
  <div class="flex items-center gap-6">
    <!-- React Dashboard Native Link -->
    <a href="http://localhost:3000/" class="bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/30 text-cyan-400 hover:text-cyan-300 transition-all rounded-lg px-3 py-1.5 text-xs font-bold flex items-center gap-1.5 shadow-sm no-underline">
      <span id="btn-react-lbl">Monitor</span>
    </a>
    <div class="h-8 w-px bg-white/10"></div>
    
    <!-- Language Toggle Button -->
    <button id="btn-lang" class="bg-white/5 hover:bg-white/10 hover:border-white/20 border border-white/10 text-white transition-all rounded-lg px-3 py-1.5 text-xs font-bold uppercase flex items-center gap-1.5 shadow-sm">
      🌐 <span>EN</span>
    </button>
    <div class="h-8 w-px bg-white/10"></div>
    <div class="flex flex-col items-end">
       <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest" id="lbl-rollbacks">Rollbacks Today</span>
       <span class="text-lg font-bold text-purple-400 text-glow" id="rollback-counter">0</span>
    </div>
    <div class="h-8 w-px bg-white/10"></div>
    <div class="flex items-center gap-2">
      <div id="agent-dot" class="heartbeat-dot"></div>
      <span id="agent-status-label" class="text-sm font-medium text-emerald-400 tracking-wide">Agent Live</span>
    </div>
    <div class="h-8 w-px bg-white/10"></div>
    <button id="btn-simulate" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 transition-all rounded-lg px-4 py-2 text-sm font-bold flex items-center gap-2 text-red-400 hover:text-red-300 shadow-[0_0_10px_rgba(239,68,68,0.2)]">
      <svg id="sim-spinner" class="animate-spin h-4 w-4 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <span id="btn-simulate-text">⚠ Simulate Incident</span>
    </button>
  </div>
</nav>

<!-- Cooldown Bar -->
<div id="cooldown-container" class="hidden mb-6 glass-card overflow-hidden h-10 w-full flex items-center relative">
  <div id="cooldown-progress" class="absolute left-0 top-0 bottom-0 bg-blue-500/20 backdrop-blur-md transition-all duration-1000 ease-linear shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 100%;"></div>
  <div class="relative z-10 px-6 w-full flex justify-between items-center text-sm font-bold text-blue-200">
    <span class="tracking-wide" id="cooldown-title-lbl">POST-REMEDIATION COOLDOWN</span>
    <span id="cooldown-label" class="font-mono">5m 0s remaining</span>
  </div>
</div>

<div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
  
  <!-- Main Column -->
  <div class="xl:col-span-2 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Latency -->
      <div class="glass-card p-6 flex flex-col justify-between h-[160px]">
        <h3 class="text-xs uppercase font-bold text-gray-400 tracking-wider" id="lbl-latency">Latency</h3>
        <div class="text-4xl font-bold font-mono transition-colors duration-300 mt-2" id="val-latency">0 <span class="text-lg text-gray-500">ms</span></div>
        <div class="h-10 w-full mt-auto">
          <canvas id="chart-latency"></canvas>
        </div>
      </div>

      <!-- Erros -->
      <div class="glass-card p-6 flex flex-col justify-between h-[160px]">
        <h3 class="text-xs uppercase font-bold text-gray-400 tracking-wider" id="lbl-error">Error Rate</h3>
        <div class="text-4xl font-bold font-mono transition-colors duration-300 mt-2" id="val-error">0.0<span class="text-lg text-gray-500">%</span></div>
        <div class="h-10 w-full mt-auto">
          <canvas id="chart-error"></canvas>
        </div>
      </div>

      <!-- Availability -->
      <div class="glass-card p-6 flex flex-col justify-between h-[160px]">
        <h3 class="text-xs uppercase font-bold text-gray-400 tracking-wider" id="lbl-avail">Availability</h3>
        <div class="text-4xl font-bold font-mono transition-colors duration-300 mt-2" id="val-avail">100<span class="text-lg text-gray-500">%</span></div>
        <div class="h-10 w-full mt-auto">
          <canvas id="chart-avail"></canvas>
        </div>
      </div>
      
    </div>

    <!-- Gemini Report Card -->
    <div id="ai-report-card" class="glass-card p-8 hidden">
      <div class="flex flex-col md:flex-row md:items-center gap-4 mb-6 text-purple-300 border-b border-white/10 pb-4">
        <span class="text-3xl">✦</span>
        <div>
          <h2 class="text-xl font-bold" id="ai-report-title">Gemini AI Post-Mortem</h2>
          <p class="text-xs font-mono mt-1 opacity-70" id="ai-report-subtitle">Automated Root Cause Analysis</p>
        </div>
        <span class="md:ml-auto text-xs font-bold bg-purple-500/20 text-purple-200 px-3 py-1.5 rounded-lg border border-purple-500/30 tracking-wider" id="ai-remediation-badge">REMEDIATION COMPLETE</span>
      </div>
      <div class="text-[14px] text-gray-200 leading-relaxed space-y-3" id="ai-report-content">
        <!-- populated by js -->
      </div>
    </div>

    <!-- Terminal Action Log -->
    <div class="glass-card p-0 flex flex-col h-[320px]">
      <div class="bg-black/40 px-4 py-2 border-b border-white/10 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
          <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
          <span class="ml-3 text-xs font-mono text-gray-500">agent_action.log</span>
        </div>
        <span class="text-[10px] font-mono text-gray-600 uppercase tracking-widest" id="terminal-live-lbl">Live Output</span>
      </div>
      <div id="terminal-log" class="p-5 flex-1 overflow-y-auto custom-scrollbar terminal-font text-xs space-y-2 text-gray-300">
        <!-- logs -->
      </div>
    </div>
  </div>

  <!-- Sidebar: Incident Timeline -->
  <div class="glass-card p-6 flex flex-col max-h-[700px] xl:max-h-none h-full">
    <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 flex items-center gap-2" id="timeline-title-lbl">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      Timeline Feed
    </h2>
    
    <!-- Timeline Search -->
    <div class="relative mb-4">
      <input 
        type="text" 
        id="timeline-search" 
        placeholder="Search timeline (S to focus)..." 
        class="w-full bg-white/5 border border-white/10 text-xs text-white placeholder-gray-500 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-1 focus:ring-cyan-500 font-sans transition-all duration-300"
      />
    </div>

    <div id="timeline-feed" class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-3">
      <!-- timeline items -->
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  let currentStatus = "OK";
  let lastUpdateTs = 0;
  let cooldownEndTime = 0;
  let cooldownInterval = null;
  const HISTORY_LEN = 20;

  // Translation configuration
  let currentLang = localStorage.getItem('sre_lang') || 'en';

  const translations = {
    en: {
      reactMonitor: "Monitor",
      navTitle: "Ops Center",
      navSubtitle: "Autonomous SRE Dashboard",
      rollbacksToday: "Rollbacks Today",
      agentLive: "Agent Live",
      agentOffline: "Agent Offline",
      simulateIncident: "⚠ Simulate Incident",
      postCooldown: "POST-REMEDIATION COOLDOWN",
      cooldownRemaining: "remaining",
      latency: "Latency",
      errorRate: "Error Rate",
      availability: "Availability",
      geminiTitle: "Gemini AI Post-Mortem",
      geminiSub: "Automated Root Cause Analysis",
      remediationComplete: "REMEDIATION COMPLETE",
      liveOutput: "Live Output",
      timelineTitle: "Timeline Feed",
      timelineSearchPlace: "Search timeline (S to focus)...",
      confidence: "Confidence Score",
      toastIncident: "Incident manually triggered.",
      toastSimulationDispatched: "Simulation request dispatched to localhost:8080",
      toastSimulationError: "Simulate request dispatched, but network error occurred.",
      toastThemeAlert: "Alert UI Style Enabled",
      toastThemeNormal: "Normal UI Style Restored",
      allNominal: "Monitoring active. All systems nominal.",
      errBreached: "Threshold breached.",
      returnedOperational: "System returned to operational parameters.",
      receivedGeminiReport: "Received Gemini Post-Mortem report",
      activeStandBy: "SRE-GPT Agent initialized. Standing by.",
      cooldownCompleted: "Cooldown period completed. Normal monitoring resumed."
    },
    fr: {
      reactMonitor: "Moniteur",
      navTitle: "Centre d'Opérations",
      navSubtitle: "Tableau de Bord SRE Autonome",
      rollbacksToday: "Rollbacks Aujourd'hui",
      agentLive: "Agent Actif",
      agentOffline: "Agent Hors-Ligne",
      simulateIncident: "⚠ Simuler un Incident",
      postCooldown: "COOLDOWN POST-RÉSOLUTION",
      cooldownRemaining: "restant",
      latency: "Latence",
      errorRate: "Taux d'Erreur",
      availability: "Disponibilité",
      geminiTitle: "Post-Mortem IA Gemini",
      geminiSub: "Analyse Automatique de Cause Racine",
      remediationComplete: "RÉSOLUTION TERMINÉE",
      liveOutput: "Flux en Direct",
      timelineTitle: "Fil d'Événements",
      timelineSearchPlace: "Recherche d'événements (S pour focus)...",
      confidence: "Score de Confiance",
      toastIncident: "Incident déclenché manuellement.",
      toastSimulationDispatched: "Requête de simulation envoyée à localhost:8080",
      toastSimulationError: "Requête envoyée, mais une erreur réseau est survenue.",
      toastThemeAlert: "Aperçu alerte UI activée",
      toastThemeNormal: "Aperçu alerte UI restaurée",
      allNominal: "Surveillance active. Paramètres nominaux.",
      errBreached: "Seuil de service franchi.",
      returnedOperational: "Le système est revenu aux paramètres opérationnels.",
      receivedGeminiReport: "Rapport Post-Mortem Gemini reçu",
      activeStandBy: "Agent SRE-GPT initialisé. En attente.",
      cooldownCompleted: "Période de cooldown terminée. Reprise de la surveillance."
    }
  };

  function translate(key) {
    return translations[currentLang][key] || translations['en'][key];
  }

  function updateUILanguage() {
    localStorage.setItem('sre_lang', currentLang);
    document.getElementById('btn-lang').querySelector('span').innerText = currentLang.toUpperCase();
    
    if (document.getElementById('btn-react-lbl')) {
      document.getElementById('btn-react-lbl').innerText = translate('reactMonitor');
    }
    
    document.getElementById('nav-title').innerText = translate('navTitle');
    document.getElementById('nav-subtitle').innerText = translate('navSubtitle');
    document.getElementById('lbl-rollbacks').innerText = translate('rollbacksToday');
    
    const sLabel = document.getElementById('agent-status-label');
    if (sLabel.innerText.toLowerCase().includes('live') || sLabel.innerText.toLowerCase().includes('actif')) {
      sLabel.innerText = translate('agentLive');
    } else {
      sLabel.innerText = translate('agentOffline');
    }
    
    document.getElementById('btn-simulate-text').innerText = translate('simulateIncident');
    document.getElementById('cooldown-title-lbl').innerText = translate('postCooldown');
    
    document.getElementById('lbl-latency').innerText = translate('latency');
    document.getElementById('lbl-error').innerText = translate('errorRate');
    document.getElementById('lbl-avail').innerText = translate('availability');
    
    document.getElementById('ai-report-title').innerText = translate('geminiTitle');
    document.getElementById('ai-report-subtitle').innerText = translate('geminiSub');
    document.getElementById('ai-remediation-badge').innerText = translate('remediationComplete');
    document.getElementById('terminal-live-lbl').innerText = translate('liveOutput');
    
    document.getElementById('timeline-title-lbl').innerHTML = `
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      ${translate('timelineTitle')}
    `;
    
    document.getElementById('timeline-search').placeholder = translate('timelineSearchPlace');
    
    renderTimeline();
  }
  
  const metricHistory = {
    latency: Array(HISTORY_LEN).fill(0),
    error: Array(HISTORY_LEN).fill(0),
    avail: Array(HISTORY_LEN).fill(1)
  };

  Chart.defaults.color = 'rgba(255,255,255,0.4)';
  Chart.defaults.font.family = 'Inter';
  Chart.defaults.plugins.tooltip.enabled = false;

  const sparklineOptions = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { 
      x: { display: false }, 
      y: { display: false, min: 0 } 
    },
    animation: false,
    elements: { point: { radius: 0 } },
    layout: { padding: 0 }
  };

  let latChart, errChart, avChart;

  function initCharts() {
    const ctxLat = document.getElementById('chart-latency').getContext('2d');
    const ctxErr = document.getElementById('chart-error').getContext('2d');
    const ctxAv = document.getElementById('chart-avail').getContext('2d');
    
    latChart = new Chart(ctxLat, { type: 'line', data: { labels: Array(HISTORY_LEN).fill(''), datasets: [{ data: metricHistory.latency, borderColor: '#06B6D4', borderWidth: 2, tension: 0.3, fill: true, backgroundColor: 'rgba(6,182,212,0.1)' }] }, options: sparklineOptions });
    errChart = new Chart(ctxErr, { type: 'line', data: { labels: Array(HISTORY_LEN).fill(''), datasets: [{ data: metricHistory.error, borderColor: '#8B5CF6', borderWidth: 2, tension: 0.3, fill: true, backgroundColor: 'rgba(139,92,246,0.1)' }] }, options: sparklineOptions });
    avChart = new Chart(ctxAv, { type: 'line', data: { labels: Array(HISTORY_LEN).fill(''), datasets: [{ data: metricHistory.avail, borderColor: '#10B981', borderWidth: 2, tension: 0.3, fill: true, backgroundColor: 'rgba(16,185,129,0.1)' }] }, options: {...sparklineOptions, scales:{y:{min:0, max:1, display:false}}} });
  }

  function updateCharts(m) {
    metricHistory.latency.push(m.latency_ms); metricHistory.latency.shift();
    metricHistory.error.push(m.error_rate); metricHistory.error.shift();
    metricHistory.avail.push(m.availability); metricHistory.avail.shift();
    
    const isError = m.latency_ms > 1000;
    latChart.data.datasets[0].borderColor = isError ? '#ef4444' : '#06B6D4';
    latChart.data.datasets[0].backgroundColor = isError ? 'rgba(239,68,68,0.1)' : 'rgba(6,182,212,0.1)';
    
    const errError = m.error_rate > 0.05;
    errChart.data.datasets[0].borderColor = errError ? '#ef4444' : '#8B5CF6';
    errChart.data.datasets[0].backgroundColor = errError ? 'rgba(239,68,68,0.1)' : 'rgba(139,92,246,0.1)';

    const avError = m.availability < 0.95;
    avChart.data.datasets[0].borderColor = avError ? '#ef4444' : '#10B981';
    avChart.data.datasets[0].backgroundColor = avError ? 'rgba(239,68,68,0.1)' : 'rgba(16,185,129,0.1)';

    latChart.update(); errChart.update(); avChart.update();
  }

  function animateValue(obj, start, end, duration, formatFn) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const val = start + progress * (end - start);
      obj.innerHTML = formatFn(val);
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }

  function checkResetCounter() {
    const today = new Date().toLocaleDateString();
    const storedDate = localStorage.getItem('sre_counter_date');
    if (storedDate !== today) {
      localStorage.setItem('sre_counter_date', today);
      localStorage.setItem('sre_rollbacks', '0');
    }
  }
  function incrementRollback() {
    checkResetCounter();
    let r = parseInt(localStorage.getItem('sre_rollbacks') || '0');
    r++;
    localStorage.setItem('sre_rollbacks', r.toString());
    updateRollbackUI();
  }
  function updateRollbackUI() {
    checkResetCounter();
    document.getElementById('rollback-counter').innerText = localStorage.getItem('sre_rollbacks') || '0';
  }

  function appendLog(type, message) {
    const logs = JSON.parse(localStorage.getItem('sre_logs') || '[]');
    const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    logs.push({ts, type, message});
    if(logs.length > 30) logs.shift();
    localStorage.setItem('sre_logs', JSON.stringify(logs));
    renderLogs();
  }
  function renderLogs() {
    const logs = JSON.parse(localStorage.getItem('sre_logs') || '[]');
    const container = document.getElementById('terminal-log');
    container.innerHTML = logs.map(l => {
      let colorClass = 'text-emerald-400';
      if(["INCIDENT", "ROLLBACK", "ERROR"].includes(l.type)) colorClass = 'text-red-400';
      else if(["ANALYSIS", "WARN"].includes(l.type)) colorClass = 'text-yellow-400';
      else if (l.type === "INFO") colorClass = 'text-cyan-400';
      return `<div class="mb-1"><span class="text-white/30 mr-3">[${l.ts}]</span><span class="${colorClass} font-bold mr-3 w-20 inline-block">[${l.type}]</span> <span class="text-gray-300 opacity-90">${l.message}</span></div>`;
    }).join("");
    container.scrollTop = container.scrollHeight;
  }

  function addTimelineEvent(status, m) {
    const feed = JSON.parse(localStorage.getItem('sre_timeline') || '[]');
    const lastEvent = feed[feed.length - 1];
    if(lastEvent && lastEvent.status === status && status === "OK") return;

    feed.push({
      status, 
      ms: m.latency_ms, 
      err: m.error_rate, 
      time: new Date().toISOString()
    });
    if(feed.length > 15) feed.shift();
    localStorage.setItem('sre_timeline', JSON.stringify(feed));
    renderTimeline();
    
    if(status === "INCIDENT") appendLog("INCIDENT", `${translate('errBreached')} Latency: ${m.latency_ms.toFixed(0)}ms, Error Rate: ${(m.error_rate*100).toFixed(1)}%`);
    if(status === "RESOLVED") appendLog("RESOLVED", translate('returnedOperational'));
    if(status === "OK" && (!lastEvent || lastEvent.status !== "OK")) appendLog("INFO", translate('allNominal'));
  }

  function renderTimeline() {
    const feed = JSON.parse(localStorage.getItem('sre_timeline') || '[]').reverse();
    const query = document.getElementById('timeline-search').value.toLowerCase().trim();
    const container = document.getElementById('timeline-feed');
    
    const filteredFeed = feed.filter(item => {
      if (!query) return true;
      const statusMatch = item.status.toLowerCase().includes(query);
      const latMatch = (`lat: ${item.ms.toFixed(0)}ms`).toLowerCase().includes(query) || item.ms.toString().includes(query);
      const errMatch = (`err: ${(item.err*100).toFixed(1)}%`).toLowerCase().includes(query) || item.err.toString().includes(query);
      return statusMatch || latMatch || errMatch;
    });

    container.innerHTML = filteredFeed.map((item, i) => {
      let bg = "bg-blue-500/10"; let border = "border-blue-500/30"; let dot = "bg-blue-400";
      let displayStatus = item.status;
      if (item.status === "RESOLVED") {
        displayStatus = currentLang === 'fr' ? "RÉSOLU" : "RESOLVED";
      }
      
      if(item.status === "INCIDENT") { bg = "bg-red-500/10"; border = "border-red-500/30"; dot = "bg-red-500 shadow-[0_0_10px_red]"; }
      if(item.status === "RESOLVED") { bg = "bg-emerald-500/10"; border = "border-emerald-500/30"; dot = "bg-emerald-400"; }
      
      const animClass = (i === 0 && !query) ? 'slide-in' : '';
      const d = new Date(item.time);
      const timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

      return `
      <div class="p-4 border ${border} ${bg} rounded-xl relative pl-10 ${animClass} backdrop-blur-sm transition-all hover:bg-white/5">
        <div class="absolute left-4 top-5 w-2 h-2 rounded-full ${dot}"></div>
        <div class="flex justify-between items-start mb-2">
          <span class="text-xs font-bold tracking-wider text-white/90 uppercase">${displayStatus}</span>
          <span class="text-[10px] text-white/40 font-mono">${timeStr}</span>
        </div>
        <div class="text-[11px] text-white/60 font-mono tracking-wide">
          LAT: <span class="text-white/90 font-mono">${item.ms.toFixed(0)}ms</span> &nbsp;|&nbsp; 
          ERR: <span class="text-white/90 font-mono">${(item.err*100).toFixed(1)}%</span>
        </div>
      </div>
      `;
    }).join("");
  }

  function startCooldown() {
    cooldownEndTime = Date.now() + 5 * 60 * 1000;
    localStorage.setItem('sre_cooldown', cooldownEndTime.toString());
    runCooldownLoop();
  }
  function runCooldownLoop() {
    const container = document.getElementById('cooldown-container');
    const bar = document.getElementById('cooldown-progress');
    const label = document.getElementById('cooldown-label');
    
    if(cooldownInterval) clearInterval(cooldownInterval);
    
    cooldownInterval = setInterval(() => {
      const now = Date.now();
      const remain = cooldownEndTime - now;
      if (remain <= 0) {
        clearInterval(cooldownInterval);
        container.classList.add('hidden');
        appendLog("INFO", translate('cooldownCompleted'));
      } else {
        container.classList.remove('hidden');
        const percent = (remain / (5*60*1000)) * 100;
        bar.style.width = `${percent}%`;
        const m = Math.floor(remain / 60000);
        const s = Math.floor((remain % 60000)/1000);
        label.innerText = `${m}m ${s}s ${translate('cooldownRemaining')}`;
      }
    }, 1000);
  }

  async function fetchStatus() {
    try {
      const r = await fetch('status.json?rnd=' + new Date().getTime());
      if (!r.ok) return;
      const data = await r.json();
      lastUpdateTs = Date.now();
      
      const m = data.metrics;
      
      const dot = document.getElementById('agent-dot');
      const sLabel = document.getElementById('agent-status-label');
      dot.className = "heartbeat-dot";
      sLabel.innerText = translate('agentLive');
      sLabel.className = "text-sm font-medium text-emerald-400 tracking-wide transition-colors";
      
      const elLat = document.getElementById('val-latency');
      const elErr = document.getElementById('val-error');
      const elAv = document.getElementById('val-avail');

      const oldLat = parseFloat(elLat.innerText) || 0;
      const oldErr = parseFloat(elErr.innerText) || 0;
      const oldAv = parseFloat(elAv.innerText) || 100;

      animateValue(elLat, oldLat, m.latency_ms, 800, v => `${v.toFixed(0)} <span class="text-lg text-gray-500 font-sans">ms</span>`);
      animateValue(elErr, oldErr, m.error_rate * 100, 800, v => `${v.toFixed(1)}<span class="text-lg text-gray-500 font-sans">%</span>`);
      animateValue(elAv, oldAv, m.availability * 100, 800, v => `${v.toFixed(1)}<span class="text-lg text-gray-500 font-sans">%</span>`);

      elLat.className = `text-4xl font-bold font-mono transition-colors duration-300 mt-2 ${m.latency_ms > 1000 ? 'text-red-400 text-glow' : 'text-white'}`;
      elErr.className = `text-4xl font-bold font-mono transition-colors duration-300 mt-2 ${m.error_rate > 0.05 ? 'text-red-400 text-glow' : 'text-white'}`;
      elAv.className = `text-4xl font-bold font-mono transition-colors duration-300 mt-2 ${m.availability < 0.95 ? 'text-red-400 text-glow' : 'text-white'}`;

      updateCharts(m);

      const prevStatus = currentStatus;
      currentStatus = data.status;

      if (currentStatus === "INCIDENT") {
        document.body.classList.add('incident-mode');
        if (prevStatus !== "INCIDENT") addTimelineEvent("INCIDENT", m);
      } else {
        document.body.classList.remove('incident-mode');
        if (prevStatus === "INCIDENT") {
          addTimelineEvent("RESOLVED", m);
          incrementRollback();
          startCooldown();
          if (data.action) appendLog("ROLLBACK", data.action);
        } else {
          addTimelineEvent("OK", m);
        }
      }

      const aiCard = document.getElementById('ai-report-card');
      const aiContent = document.getElementById('ai-report-content');
      if (data.analysis) {
        if (aiCard.classList.contains('hidden')) {
           aiCard.classList.remove('hidden');
           aiCard.classList.add('slide-in');
           appendLog("ANALYSIS", translate('receivedGeminiReport'));
        }
        
        let formatted = data.analysis.replace(/^\*\s|^\-\s|^\*/gm, "• ")
                                     .replace(/Root cause:/i, `<div class='text-white font-bold my-2 text-[15px]'>${currentLang === 'fr' ? 'Cause racine :' : 'Root cause:'}</div>`)
                                     .replace(/Action:/i, `<div class='text-white font-bold my-2 mt-4 text-[15px]'>${currentLang === 'fr' ? 'Action :' : 'Action:'}</div>`)
                                     .replace(/\n/g, "<br>");
        const confidence = `<div class='mb-4 font-mono text-xs opacity-70'>${translate('confidence')}: <span class='text-emerald-400 font-bold'>98.4%</span></div>`;
        
        aiContent.innerHTML = confidence + formatted;
      } else {
        aiCard.classList.add('hidden');
      }

    } catch(e) {
      console.log("Fetch failed", e);
    }
  }

  setInterval(() => {
    if (lastUpdateTs > 0 && (Date.now() - lastUpdateTs) > 90000) {
      const dot = document.getElementById('agent-dot');
      dot.className = "heartbeat-dot offline";
      document.getElementById('agent-status-label').innerText = translate('agentOffline');
      document.getElementById('agent-status-label').className = "text-sm font-medium text-red-400";
    }
  }, 5000);

  document.getElementById('btn-simulate').addEventListener('click', async () => {
    const spinner = document.getElementById('sim-spinner');
    spinner.classList.remove('hidden');
    try {
      await fetch('https://sre-gpt-api.onrender.com/simulate/latency?seconds=3');
      showToast(translate('toastIncident'));
      appendLog("SYSTEM", "Manual incident simulation triggered via API.");
    } catch(e) {
      showToast(translate('toastSimulationDispatched'));
      appendLog("WARN", translate('toastSimulationError'));
    }
    setTimeout(() => spinner.classList.add('hidden'), 1000);
  });

  function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = "glass-card px-5 py-4 mb-3 text-sm font-mono text-cyan-100 flex items-center gap-3 slide-in shadow-[0_4px_15px_rgba(0,0,0,0.5)]";
    t.innerHTML = `<svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateY(10px) scale(0.95)';
      setTimeout(() => t.remove(), 400);
    }, 4000);
  }

  window.addEventListener('DOMContentLoaded', () => {
    initCharts();
    updateRollbackUI();
    
    // Wire Search Field
    document.getElementById('timeline-search').addEventListener('input', () => {
      renderTimeline();
    });

    // Wire Language Toggle
    document.getElementById('btn-lang').addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'fr' : 'en';
      updateUILanguage();
    });

    // Wire Shortcuts
    window.addEventListener('keydown', (e) => {
      const activeEl = document.activeElement;
      if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
        return;
      }
      if (e.key.toLowerCase() === 'd') {
        e.preventDefault();
        const bodyToggle = document.body.classList.toggle('incident-mode');
        showToast(bodyToggle ? translate('toastThemeAlert') : translate('toastThemeNormal'));
      } else if (e.key.toLowerCase() === 's') {
        e.preventDefault();
        document.getElementById('timeline-search').focus();
      }
    });

    updateUILanguage();
    renderTimeline();
    renderLogs();
    
    if (localStorage.getItem('sre_logs') === null) {
      appendLog("INFO", translate('activeStandBy'));
    }
    
    const cd = localStorage.getItem('sre_cooldown');
    if (cd && parseInt(cd) > Date.now()) {
      cooldownEndTime = parseInt(cd);
      runCooldownLoop();
    }
    
    fetchStatus();
    setInterval(fetchStatus, 15000);
  });
</script>
</body>
</html>
