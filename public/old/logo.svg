      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="200" height="200" rx="32" fill="none" stroke="url(#cyanPurple)" stroke-width="1.5"/>

  <!-- Outer ring -->
  <circle cx="100" cy="95" r="65" fill="none" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Neural lines -->
  <line x1="100" y1="95" x2="100" y2="38" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="95" x2="149" y2="63" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="100" y1="95" x2="149" y2="127" stroke="#7C3AED" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="100" y1="95" x2="100" y2="152" stroke="#7C3AED" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="100" y1="95" x2="51" y2="127" stroke="#7C3AED" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="100" y1="95" x2="51" y2="63" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Cross connections -->
