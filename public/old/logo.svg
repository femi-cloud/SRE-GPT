  <line x1="149" y1="63" x2="149" y2="127" stroke="#06B6D4" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="149" y1="127" x2="100" y2="152" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="100" y1="152" x2="51" y2="127" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="51" y1="127" x2="51" y2="63" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="51" y1="63" x2="100" y2="38" stroke="#06B6D4" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Outer nodes -->
  <circle cx="100" cy="38" r="4" fill="#06B6D4" fill-opacity="0.9"/>
  <circle cx="149" cy="63" r="3" fill="#06B6D4" fill-opacity="0.7"/>
  <circle cx="149" cy="127" r="3" fill="#7C3AED" fill-opacity="0.7"/>
  <circle cx="100" cy="152" r="4" fill="#7C3AED" fill-opacity="0.9"/>
  <circle cx="51" cy="127" r="3" fill="#7C3AED" fill-opacity="0.7"/>
  <circle cx="51" cy="63" r="3" fill="#06B6D4" fill-opacity="0.7"/>

  <!-- Center core -->
  <circle cx="100" cy="95" r="26" fill="#0B1220"/>
  <circle cx="100" cy="95" r="26" fill="none" stroke="url(#cyanPurple)" stroke-width="1.5"/>
  <circle cx="100" cy="95" r="18" fill="url(#cyanPurple)" fill-opacity="0.15"/>
  <circle cx="100" cy="95" r="11" fill="url(#cyanPurple)" fill-opacity="0.3"/>
  <circle cx="100" cy="95" r="5" fill="url(#cyanPurple)"/>
  <circle cx="100" cy="95" r="2.5" fill="white" fill-opacity="0.9"/>

