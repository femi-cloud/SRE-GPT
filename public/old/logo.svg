<svg viewBox="0 0 200 200" width="200" height="200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SRE-GPT AI Agent Logo</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
