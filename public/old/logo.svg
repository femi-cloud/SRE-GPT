  <rect x="86" y="170" width="3" height="11" rx="1" fill="#7C3AED" fill-opacity="0.7"/>
  <rect x="92" y="165" width="3" height="16" rx="1" fill="#7C3AED" fill-opacity="0.9"/>
  <rect x="98" y="169" width="3" height="12" rx="1" fill="#06B6D4" fill-opacity="0.8"/>
  <rect x="104" y="166" width="3" height="15" rx="1" fill="#06B6D4" fill-opacity="0.9"/>
  <rect x="110" y="171" width="3" height="10" rx="1" fill="#06B6D4" fill-opacity="0.7"/>
  <rect x="116" y="168" width="3" height="13" rx="1" fill="#7C3AED" fill-opacity="0.8"/>
